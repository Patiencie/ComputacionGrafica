<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear un cuadrado y un triángulo</title>
</head>
<body>
    <h2>Creación de un cuadrado y un triángulo</h2>
        <style>
        h2 {
            color: green;
        }
    </style>
    <h2>Realizado por Jhon Anderson Quispe Mamani</h2>
    <canvas id="myCanvas" width="500" height="500" style="border:4px solid black;"></canvas>

    <script>
        var canvas = document.getElementById("myCanvas");
        var ctx = canvas.getContext("2d");

        // DIBUJAR UN CUADRADO
        ctx.beginPath();
        ctx.rect(175, 40, 150, 150); // x, y, ancho, alto
        ctx.fillStyle = "blue";
        ctx.fill();
        ctx.stroke();

        // DIBUJAR UNA LÍNEA HORIZONTAL
        ctx.beginPath();
        ctx.moveTo(0, 250);   // Desde el borde izquierdo
        ctx.lineTo(500, 250); // Hasta el borde derecho
        ctx.stroke();

        // DIBUJAR UN TRIÁNGULO
        ctx.beginPath();
        ctx.moveTo(250, 300); // Inicio en el vértice superior del triángulo
        ctx.lineTo(170, 450); // Vértice inferior derecho del triángulo
        ctx.lineTo(330, 450); // Vértice inferior izquierdo del triángulo
        ctx.closePath(); // Cierra el camino para formar el triángulo
        ctx.fillStyle = "yellow";
        ctx.fill();
        ctx.stroke();
    </script>
    
</body>
</html>
