<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objetos 3D</title>
</head>
<body>
    <style> 
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif;}
        canvas { display: block; } /* Evita espacios extra debajo del canvas */

        titulo {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            pointer-events: none;
        }
        h2 { margin: 0; font-size: 1.4rem; font-weight: 100;}
    </style>

    <titulo>
        <h2>Propuesta 1: Traslación animada de un cubo en el espacio 3D</h2>
        <h2>Realizado por: Jhon Anderson Quispe Mamani</h2>
    </titulo>

        <!-- EJERCICIO DE TRASLACIÓN -->
    <!-- USO DE LA LIBRERIA THREE.JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <Script>
        // CREAR LA ESCENA
        const scene = new THREE.Scene();
        
        // CREAR UNA CAMARA
        const camera = new THREE.PerspectiveCamera(33, window.innerWidth / window.innerHeight, 0.1, 1000);

        // CREAR UN RENDERIZADOR
        const renderer = new THREE.WebGLRenderer({antialias: true});
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // CREAR EL CUBO
        const geometry = new THREE.BoxGeometry(1,1,1);
        const material = new THREE.MeshNormalMaterial();
        const cubo = new THREE.Mesh(geometry, material);
        scene.add(cubo);

        
        // POSICIONAR LA CAMARA
        camera.position.z = 12;

        // variables para controlar la posición del cubo
        let direccion = 0.02;

        // ANIMACIÓN 
        function animate() {
            requestAnimationFrame(animate);
            // MOVER EL CUBO
            cubo.position.x += direccion;
            // CAMBIAR LA DIRECCIÓN SI EL CUBO LLEGA A LOS LÍMITE DERECHO 
            if (cubo.position.x > 6.7) {
                direccion = -0.02;
            }
            // CAMBIAR LA DIRECCIÓN SI EL CUBO LLEGA A LOS LÍMITE IZQUIERDO 
            if (cubo.position.x < -6.7) {
                direccion = 0.02;
            }

            //Dibujar la escena
            renderer.render(scene, camera);
        }
        animate();

    </Script>
</body>
</html>
