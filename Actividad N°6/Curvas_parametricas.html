<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Investigación - Computación Gráfica</title>
    <style>
        /* Estilo del fondo de la página (el color que quieres que resalte) */
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* Un gris oscuro elegante o el color que prefieras */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* Contenedor del PDF para que parezca una hoja centrada */
        .pdf-container {
            width: 80%; /* Ajusta el ancho que ocupará el PDF */
            height: 90vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); /* Sombra para dar profundidad */
            border: 2px solid #333;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="pdf-container">
        <!-- Reemplaza "Tu_Archivo.pdf" por el nombre real de tu archivo -->
        <iframe src="Tu_Archivo.pdf#toolbar=1" type="application/pdf">
            <p>Tu navegador no admite PDFs. <a href="Actividad N°6/Curva paramétrica y mallas poligonales.pdf">Haz clic aquí para descargarlo.</a></p>
        </iframe>
    </div>

</body>
</html>
