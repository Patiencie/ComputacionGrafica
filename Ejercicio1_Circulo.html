<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creación de un círculo</title>
</head>
<body>
    <h2>Creación de un círculo</h2>
    <style>
        h2 {
            color: green;
        }
    </style>
    <h2>Realizado por Jhon Anderson Quispe Mamani</h2>
    <!-- DEFINIR UN AREA DE DIBUJO CON EL ELEMENTO CANVAS -->
    <canvas id="myCanvas" width="500" height="500" style="border:1px solid blue;"></canvas>

    <!-- CÓDIGO DE JAVASCRIPT-->
        <script>
            // OBTENER EL CONTEXTO DE DIBUJO DEL CANVAS
            var canvas = document.getElementById("myCanvas");

            // SE OBTIENE EL CONTEXTO DE DIBUJO EN 2D
            var ctx = canvas.getContext("2d");

            // COMENZAR EL TRAZADO DE UN (CIRCULO EN ESTE PUNTO SE INICIA EL DIBUJO)
            ctx.beginPath();

            // DIBUJAR EL ARCO PARA REPRESENTAR EL CIRCULO
                // las coordenadas (x, y) ubiqué al centro

            // EL RADIO DEL CIRCULO ES DE 100 PIXELES
            ctx.arc(250, 250, 100, 0, 2 * Math.PI);

            // DEFINIR EL COLOR DEL RELLENO
            ctx.fillStyle = "brown";

            // RELLENAR EL CIRCULO CON EL COLOR DEFINIDO
            ctx.fill();

            // DIBUJAR EL BORDE DEL CIRCULO CON UN COLOR DIFERENTE
            ctx.stroke();
            
        </script>
</body>
</html>
