<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investigación: Computación Gráfica</title>
    <style>
        /* Fondo con degradado animado más sutil */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, #0f0c29, #24243e);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Contenedor sin cuadro, aprovechando casi toda la pantalla */
        .pdf-fullscreen {
            width: 95vw; /* Casi todo el ancho de la ventana */
            height: 92vh; /* Casi todo el alto de la ventana */
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff;
        }

        /* Botón de volver más pequeño y mejor ubicado */
        .back-btn {
            position: absolute;
            top: 10px;
            left: 15px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 12px; /* Más pequeño */
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            z-index: 10; /* Asegura que esté por encima de todo */
            padding: 5px 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
        }

        .back-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            text-shadow: 0 0 5px #fff;
        }
    </style>
</head>
<body>

    <!-- Botón pequeño para no interferir con el diseño -->
    <a href="../index.html" class="back-btn">← INICIO</a>

    <div class="pdf-fullscreen">
        <iframe src="Curva paramétrica y mallas poligonales.pdf#toolbar=1&view=FitH" type="application/pdf">
            <p>Tu navegador no permite ver el PDF. <a href="Curva paramétrica y mallas poligonales.pdf">Descargar</a>.</p>
        </iframe>
    </div>

</body>
</html>
