<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRASLACIÓN, ROTACIÓN Y ESCALADO</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* Mejora del panel de controles */
    #info { 
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7); /* Fondo oscuro elegante */
        color: white;
        padding: 15px;
        border-radius: 12px;
        font-size: 13px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        pointer-events: none;
    }

    #info b { color: #00d4ff; } /* Resaltado para las teclas */

    titulo {
        position: absolute;
        top: 20px;
        width: 100%;
        text-align: center;
        color: white;
        pointer-events: none;
    }
    
    h2 { margin: 0; font-size: 1.4rem; font-weight: 300; }
</style>

    <titulo>
        <h2>Propuesta 3: Manipulación interactiva de transformaciones 3D en JavaScript</h2>
        <h2>Realizado por: Jhon Anderson Quispe Mamani</h2>
    </titulo>

</head>
<body>

    <!-- intrucciones para el usuario -->
    <div id="info">
        <strong style="font-size: 16px;">Panel de Controles</strong><br><br>
        <b>W / S</b> : Mover Arriba / Abajo<br>
        <b>A / D</b> : Mover Izquierda / Derecha<br>
        <b>Q / E</b> : Rotar Cubo<br>
        <b>Z / X</b> : Escalar (Tamaño)<br>
    </div>

    <!-- importamos Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

    <!-- EJERCICIO DE TRASLACIÓN, ROTACIÓN Y ESCALADO -->
    <script>
        // CREAR LA ESCENA
        const scene = new THREE.Scene();
        // crear el fondo de la escena
        scene.background = new THREE.Color(0x202020); // fondo oscuro elegante
        // CREAR UNA CAMARA
        const camera = new THREE.PerspectiveCamera(33, window.innerWidth / window.innerHeight, 0.1, 1000);

        // CREAR UN RENDERIZADOR
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // CREAR EL OBJETO 3D
        const geometry = new THREE.BoxGeometry(1,1,1);
        const material = new THREE.MeshNormalMaterial();
        const cubo = new THREE.Mesh(geometry, material);
        scene.add(cubo);

        // agregar la luz
        // agregar una luz direccional para mejorar la apariencia del cubo
        const light = new THREE.PointLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);

        // POSICIONAR LA CAMARA
        camera.position.z = 12;

        // variables para controlar la dirección del movimiento mediante teclado
        window.addEventListener('keydown', (event) => {
            switch(event.key) {
                
                //TRASLACIÓN EN EL EJE "Y" y "X"
                case 'w':
                case 'W':
                    if (cubo.position.y < 2.9) cubo.position.y += 0.2; // mover hacia arriba con límite
                break;

                case 's':
                case 'S':
                    if (cubo.position.y > -2.9) cubo.position.y -= 0.2; // mover hacia abajo con límite
                break;

                case 'a':
                case 'A':
                    if (cubo.position.x > -6.5) cubo.position.x -= 0.2; // mover hacia la izquierda con límite
                break;

                case 'd':
                case 'D':
                    if (cubo.position.x < 6.5) cubo.position.x += 0.2; // mover hacia la derecha con límite
                break;  

                // ROTACIÓN Y ESCALADO
                case 'q':
                case 'Q':
                    cubo.rotation.y -= 0.1; // rotar a la izquierda
                break;

                case 'e':
                case 'E':
                    cubo.rotation.y += 0.1; // rotar a la derecha
                break;
                    
                // ESCALADO
                case 'z':
                case 'Z':
                    if (cubo.scale.x < 5.3) { // límite de tamaño máximo
                        cubo.scale.x += 0.1;
                         cubo.scale.y += 0.1;
                        cubo.scale.z += 0.1;
                    }
                break;      

                // escalar hacia arriba
                // para evitar que el cubo se vuelva demasiado pequeño, se puede agregar una condición para limitar el escalado hacia abajo
                case 'x':
                case 'X':
                    if (cubo.scale.x > 0.3) { // límite de tamaño mínimo
                        cubo.scale.x -= 0.1;
                        cubo.scale.y -= 0.1;
                        cubo.scale.z -= 0.1;
                    }
                break;
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            // DIBUJAR LA ESCENA
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
