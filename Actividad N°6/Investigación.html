<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad N°6 - Investigación | Computación Gráfica</title>
    <style>
        /* Fondo oscuro profesional (estilo editor de código/diseño) */
        body {
            margin: 0;
            padding: 0;
            background-color: #0e0e10; /* Gris casi negro */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* Botón de volver minimalista (estilo GitHub/Vercel) */
        .btn-back {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #efeff1;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
            z-index: 100;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Contenedor del PDF */
        .pdf-viewport {
            width: 90vw;
            height: 92vh;
            background: #18181b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid #27272a;
            display: flex;
            flex-direction: column;
        }

        /* Barra superior simulada para el visor */
        .pdf-header {
            background: #1f1f23;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #27272a;
        }

        .pdf-title {
            color: #adadb8;
            font-size: 12px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #ffffff; /* Fondo blanco para que el PDF no parpadee */
        }

        /* Estilo para pantallas pequeñas */
        @media (max-width: 768px) {
            .pdf-viewport {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
            }
            .btn-back {
                top: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>

    <a href="../index.html" class="btn-back">← Volver al curso</a>

    <div class="pdf-viewport">
        <div class="pdf-header">
            <div class="pdf-title">Curvas Paramétricas y Mallas Poligonales - UTEA 2026</div>
            <div style="display: flex; gap: 6px;">
                <div style="width: 10px; height: 10px; border-radius: 50%; background: #ff5f57;"></div>
                <div style="width: 10px; height: 10px; border-radius: 50%; background: #febc2e;"></div>
                <div style="width: 10px; height: 10px; border-radius: 50%; background: #28c840;"></div>
            </div>
        </div>
        
        <!-- El parámetro #toolbar=1 muestra las herramientas, #view=FitH ajusta el ancho -->
        <iframe 
            src="Curva paramétrica y mallas poligonales.pdf#toolbar=1&view=FitH" 
            type="application/pdf">
            <p>Tu navegador no admite PDFs. <a href="Curva paramétrica y mallas poligonales.pdf">Descargar archivo</a>.</p>
        </iframe>
    </div>

</body>
</html>
