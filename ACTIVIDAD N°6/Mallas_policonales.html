
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mallas Poligonales - Computación Gráfica</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #111; overflow: hidden; }
        .btn-regresar {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            padding: 8px 15px; background: #fff; color: #000;
            text-decoration: none; border-radius: 5px; font-weight: bold;
        }
        titulo {
            position: absolute; top: 20px; width: 100%;
            text-align: center; color: white; pointer-events: none;
        }
        h2 { margin: 0; font-size: 1.4rem; font-weight: 300; }
    </style>
</head>
<body>

    <a href="javascript:history.back()" class="btn-regresar">Regresar</a>

    <titulo>
        <h2>Visualización de Malla Poligonal (Wireframe)</h2>
        <h2>Realizado por: Jhon Anderson Quispe Mamani</h2>
    </titulo>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 1. Definimos una geometría compleja (Esfera)
        // Los parámetros (radius, widthSegments, heightSegments)
        const geometry = new THREE.SphereGeometry(2, 16, 12);

        // 2. Creamos un material de tipo 'Wireframe' para ver la malla
        const material = new THREE.MeshBasicMaterial({ 
            color: 0x00d4ff, 
            wireframe: true // Esto activa la visualización de la malla
        });

        const esferaMalla = new THREE.Mesh(geometry, material);
        scene.add(esferaMalla);

        camera.position.z = 8;

        function animate() {
            requestAnimationFrame(animate);
            
            // Rotamos la malla para apreciar los polígonos
            esferaMalla.rotation.y += 0.005;
            esferaMalla.rotation.x += 0.005;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
