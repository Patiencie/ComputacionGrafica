<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 2: Gráfico de Puntos en Movimiento</title>
    <style>
        h2 { color: blue; text-align: center; font-family: Arial, sans-serif; }
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-color: #f4f4f4; 
            margin-top: 50px;
        }
        canvas { 
            background-color: white; 
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2); 
        }
    </style>
</head>
<body>

    <h2>Ejercicio 2: Gráfico de Puntos en Movimiento</h2>
    <h2>Realizado por Jhon Anderson Quispe Mamani</h2>

    <canvas id="canvasPuntos" width="500" height="500" style="border:2px solid black;"></canvas>

    <script>
        var canvas = document.getElementById("canvasPuntos");
        var ctx = canvas.getContext("2d");

        // 1. Crear al menos 5 puntos con coordenadas iniciales aleatorias
        var puntos = [];
        for (var i = 0; i < 5; i++) {
            puntos.push({
                x: Math.random() * 400 + 50, // Entre 50 y 450 para que no toquen el borde
                y: Math.random() * 400 + 50,
                color: "red"
            });
        }

        function dibujarPuntos() {
            // 2. Usar clearRect() para limpiar el lienzo antes de volver a dibujar
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar ejes (referencia visual)
            ctx.beginPath();
            ctx.strokeStyle = "#ddd";
            ctx.moveTo(0, 250); ctx.lineTo(500, 250); // Eje X
            ctx.moveTo(250, 0); ctx.lineTo(250, 500); // Eje Y
            ctx.stroke();

            // 3. Actualizar coordenadas y redibujar cada punto
            puntos.forEach(function(punto, index) {
                
                // Actualizar posición de manera aleatoria
                // Sumamos o restamos un valor pequeño para simular movimiento
                punto.x = Math.random() * 400 + 50;
                punto.y = Math.random() * 400 + 50;

                // Dibujar el punto (círculo pequeño)
                ctx.beginPath();
                ctx.arc(punto.x, punto.y, 8, 0, 2 * Math.PI); // x, y, radio, angulo inicial, final
                ctx.fillStyle = punto.color;
                ctx.fill();
                
                // Mostrar coordenadas encima del punto
                ctx.fillStyle = "black";
                ctx.font = "12px Arial";
                ctx.fillText("P" + (index + 1) + " (" + Math.round(punto.x) + "," + Math.round(punto.y) + ")", punto.x + 10, punto.y - 10);
            });
        }

        // 4. Actualizar el gráfico cada segundo (1000ms)
        setInterval(dibujarPuntos, 1000);

        // Llamada inicial
        dibujarPuntos();
    </script>
    
</body>
</html>
