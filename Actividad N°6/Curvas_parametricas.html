<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investigación: Computación Gráfica</title>
    <style>
        /* Fondo con degradado animado para que se vea premium */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Contenedor con efecto de cristal (Glassmorphism) */
        .pdf-wrapper {
            width: 85%;
            height: 92vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            color: #fff;
            margin-bottom: 15px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* Estilo del Iframe */
        iframe {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            border: none;
            background-color: #fff; /* Para que no parpadee en negro al cargar */
        }

        /* Botón de regreso flotante opcional */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.7;
            transition: 0.3s;
        }

        .back-btn:hover {
            opacity: 1;
            text-shadow: 0 0 8px #fff;
        }
    </style>
</head>
<body>

    <a href="../index.html" class="back-btn">← Volver al inicio</a>

    <div class="pdf-wrapper">
        <h2>Visualizador de Investigación</h2>
        
        <!-- Importante: Verifica que el nombre coincida EXACTO (espacios y tildes) -->
        <iframe src="Curva paramétrica y mallas poligonales.pdf#toolbar=1&view=FitH" type="application/pdf">
            <p>Tu navegador no admite la visualización directa. 
               <a href="Curva paramétrica y mallas poligonales.pdf" style="color: #00d4ff;">Descargar PDF aquí</a>.
            </p>
        </iframe>
    </div>

</body>
</html>
