<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear un gráfico de barras</title>
</head>
<body>
    <style>
        h2 {
            color: green;
        }
    </style>
    <h2>Crear un gráfico de barras</h2>
    <h2>Realizado por Jhon Anderson Quispe Mamani</h2>

    <canvas id="myCanvas" width="500" height="500" style="border:4px solid brown;"></canvas>
    <script>
        var canvas = document.getElementById("myCanvas");
        var ctx = canvas.getContext("2d");

        // DATOS DE BARRAS
        var datos = [100, 200, 300, 400, 450];
        var colores = ["red", "blue", "green", "orange", "purple"];
        var porcentajes = ["50%", "60%", "70%", "80%", "90%", "100%"];

        // AUMENTAR EL TAMAÑO DE LA FUENTE
        // 'bold' para negrita, '15px' para el tamaño
        ctx.font = "bold 15px Arial"; 
        ctx.textAlign = "center";

        // DIBUJAR LAS BARRAS
        var x = 50; // Posición inicial en el eje x
        var width = 50; // Ancho de cada barra
        for (var i = 0; i < datos.length; i++) {
            ctx.beginPath();
            ctx.rect(x, 500 - datos[i], width, datos[i]); // x, y, ancho, alto
            ctx.fillStyle = colores[i];
            ctx.fill();
            ctx.stroke();

        // PONER LOS PORCENTAJES SOBRE CADA BARRA
            ctx.fillStyle = "green";
            // Parámetros: texto, posición X (centro de la barra), posición Y (un poco arriba de la barra)
            ctx.fillText(porcentajes[i], x + (width / 2), 500 - datos[i] - 10);
            x += width + 20; // Espacio entre barras
        }

    </script>
</body>
</html>
