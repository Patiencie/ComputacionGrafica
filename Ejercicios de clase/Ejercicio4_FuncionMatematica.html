<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Grafico de una función matemática</title>
    <style>
        h2 { color: blue; }
    </style>
</head>
<body>
    <h2>Grafico de una función</h2>
    <h2>Realizado por Jhon Anderson Quispe Mamani</h2>

    <canvas id="myCanvas" width="500" height="500" style="border:2px solid black;"></canvas>

    <!-- CÓDIGO DE JAVASCRIPT PARA DIBUJAR LA FUNCIÓN -->
    <script>
        var canvas = document.getElementById("myCanvas");
        var ctx = canvas.getContext("2d");

        // DIBUJAR LOS EJES
        ctx.beginPath();
        ctx.moveTo(0, 250); // Eje X
        ctx.lineTo(500, 250);
        ctx.moveTo(250, 0); // Eje Y
        ctx.lineTo(250, 500);
        ctx.stroke();

        // Funcion a graficar: y = x^2
        ctx.beginPath();
        ctx.moveTo(0, 200); // Punto inicial en el eje X

        // para la arriba del eje Y, agregar un signo - al math para abajo
        for (var x = -250; x <= 250; x++) {
            var y = Math.pow(x, 2) / 100; // función para que se ajuste al canvas
            ctx.lineTo(250 + x, 250 - y); // Ajusta la posición para que centre en el canvas
        }

        // para la derecha del eje Y, agregar un signo - al math para la izquierda
        /*for (var y = -250; y <= 250; y++) {
            var x = Math.pow(y, 2) / 100; // Ahora calculamos X en función de Y
            ctx.lineTo(250 + x, 250 - y); // Centramos X sumando el valor, Y restando
        }*/

        ctx.strokeStyle = "red";
        ctx.stroke();

    </script>
    
</body>
</html>
