<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exposición - Computación Gráfica</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Contenedor idéntico con efecto Glassmorphism */
        .ppt-wrapper {
            width: 85%;
            height: 90vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            z-index: 100;
        }

        .back-btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #121212; /* Fondo oscuro por si tarda en cargar Canva */
        }
    </style>
</head>
<body>

    <a href="../index.html" class="back-btn">← VOLVER</a>

    <div class="ppt-wrapper">
        <!-- Reemplaza el 'src' con tu enlace de inserción de Canva -->
        <iframe src="https://canva.link/sjhakyfa6x73lgn" allowfullscreen="allowfullscreen" allow="fullscreen">
        </iframe>
    </div>

</body>
</html>
