<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investigación - Computación Gráfica</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Fondo degradado similar al anterior */
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Regresamos al contenedor llamativo */
        .pdf-wrapper {
            width: 85%;
            height: 90vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Importante para que el iframe respete las esquinas redondeadas */
        }

        /* Ajuste del botón de volver para que no lo tape el borde */
        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            z-index: 100;
        }

        .back-btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* Intentamos que el fondo del iframe sea blanco antes de cargar */
            background-color: white; 
        }
    </style>
</head>
<body>

    <a href="../index.html" class="back-btn">← VOLVER</a>

    <div class="pdf-wrapper">
        <!-- El truco del #view=FitH intenta que el PDF ocupe todo el ancho para tapar lo gris -->
        <iframe src="Monografia Modelado 3D y herramientas digitales.pdf#toolbar=1&view=FitH" type="application/pdf">
            <p>Tu navegador no admite PDFs. <a href="Monografia Modelado 3D y herramientas digitales.pdf">Descárgalo aquí</a>.</p>
        </iframe>
    </div>

</body>
</html>
